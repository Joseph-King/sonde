[tools]
go = "1.26.4"
gitleaks = "v8.18.4"
"cargo:prek" = "latest"
"go:github.com/google/addlicense" = "latest"

bash = "5.2"
zsh = "5.9"
fish = "3.7"

[tasks.init]
description = "Install tools, hook up hooks, and prepare environment"
run = """
prek install
go mod tidy
"""

[tasks.build]
description = "Compile sonde binary with version metadata"
run = """
VERSION="v0.1.0-alpha"
COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "none")
DATE=$(date -u +%Y-%m-%d)

go build -ldflags "-X github.com/Joseph-King/sonde/internal/cli.Version=${VERSION} -X github.com/Joseph-King/sonde/internal/cli.CommitSHA=${COMMIT} -X github.com/Joseph-King/sonde/internal/cli.BuildDate=${DATE}" -o build/sonde ./main.go
"""

[tasks.prek]
description = "Clean prek then run --all-files"
run = """
prek clean
prek run --all-files
"""

[tasks.test]
description = "Run tests"
run = """
go test -v -race -cover ./...
"""
