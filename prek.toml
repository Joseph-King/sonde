# Global settings for pre-commit tracking
minimum_prek_version = "0.1.0"

[[repos]]
# Standard, ultra-fast structural checks
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v4.6.0"
hooks = [
    { id = "trailing-whitespace" },
    { id = "end-of-file-fixer" },
    { id = "check-yaml" },
    { id = "check-toml" }
]

[[repos]]
repo = "local"
hooks = [
    { id = "go-mod-tidy", name = "go mod tidy", entry = "go mod tidy", language = "system", files = "\\.go$", pass_filenames = false },
    { id = "add-license-headers", name = "addlicense", entry = "addlicense -v -l apache -c \"Joseph King\" -y 2026", language = "golang", additional_dependencies = ["github.com/google/addlicense@latest"], files = "\\.go$" },
    { id = "go-test", name = "go test", entry = "go test -race -short ./...", language = "system", files = "\\.go$", pass_filenames = false }
]

[[repos]]
# Native formatting and code-quality checks for your Go modules
repo = "https://github.com/golangci/golangci-lint"
rev = "v2.12.2"  # Upgrade from v1.59.1 to v2.x
hooks = [
    { id = "golangci-lint", name = "golangci-lint", entry = "golangci-lint run" }
]

[[repos]]
# Enforce Conventional Commits right at git commit time
repo = "https://github.com/alessandrojcm/commitlint-pre-commit-hook"
rev = "v9.16.0"
hooks = [
    { id = "commitlint", stages = ["commit-msg"] }
]

[[repos]]
# Scan staged changes for leaked secrets, API keys, and tokens
repo = "https://github.com/gitleaks/gitleaks"
rev = "v8.18.4"  # Use the latest stable v8 release
hooks = [
    { id = "gitleaks-system" }
]
